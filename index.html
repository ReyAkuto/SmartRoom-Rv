<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Room — Remote Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase SDK v8 (compat mode, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* ── Reset & Base ───────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg:      #070809;
  --bg2:     #0d0f11;
  --panel:   #111417;
  --border:  #1e2228;
  --border2: #252b34;
  --text:    #e2e5ea;
  --text2:   #6b7280;
  --text3:   #3d4450;
  --amber:   #f59e0b;
  --amber2:  #fbbf24;
  --amber-dim:#78480a;
  --green:   #10b981;
  --green-dim:#064e3b;
  --red:     #ef4444;
  --red-dim: #450a0a;
  --blue:    #3b82f6;
  --blue-dim:#1e3a5f;
  --r: 6px;
}
html { font-size: 15px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scanlines overlay (atmosphere) ───────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Login Screen ──────────────────────────────────────────── */
#loginScreen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.login-box {
  width: 100%;
  max-width: 380px;
}
.login-brand {
  text-align: center;
  margin-bottom: 40px;
}
.login-brand .logo {
  font-family: 'Martian Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--amber);
  display: block;
  margin-bottom: 8px;
}
.login-brand h1 {
  font-family: 'Martian Mono', monospace;
  font-size: 28px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: -.02em;
}
.login-brand h1 span { color: var(--amber); }

.login-field {
  margin-bottom: 12px;
}
.login-field label {
  display: block;
  font-size: 11px;
  font-family: 'Martian Mono', monospace;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 6px;
}
.login-field input {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.login-field input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px rgba(245,158,11,.12);
}
.btn-login {
  width: 100%;
  margin-top: 8px;
  padding: 14px;
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: var(--r);
  font-family: 'Martian Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn-login:hover { opacity: .9; }
.btn-login:active { transform: scale(.98); }
.login-error {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--r);
  font-size: 13px;
  color: var(--red);
  display: none;
}

/* ── Main Dashboard ────────────────────────────────────────── */
#dashboard {
  display: none;
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ── Topbar ─────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.brand {
  font-family: 'Martian Mono', monospace;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: .05em;
}
.brand span { color: var(--amber); }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.conn-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text2);
}
.conn-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text3);
  transition: background .3s;
}
.conn-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
.conn-dot.offline { background: var(--red); }
.conn-dot.syncing { background: var(--amber); animation: pulse-amber .8s infinite; }
@keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes pulse-amber{ 0%,100%{opacity:1} 50%{opacity:.3} }

.btn-logout {
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  letter-spacing: .06em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 6px 12px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all .15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── Device Status Header ──────────────────────────────────── */
.device-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.device-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Martian Mono', monospace;
  font-size: 11px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.device-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text3);
}
.device-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
.last-update {
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .04em;
}

/* ── Section Labels ─────────────────────────────────────────── */
.sec-label {
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

/* ── Environment Panel ──────────────────────────────────────── */
.env-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.env-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.env-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.env-card.temp::before { background: linear-gradient(90deg, var(--amber), transparent); }
.env-card.hum::before  { background: linear-gradient(90deg, var(--blue),  transparent); }
.env-val {
  font-family: 'Martian Mono', monospace;
  font-size: 42px;
  font-weight: 300;
  letter-spacing: -.03em;
  line-height: 1;
}
.env-card.temp .env-val { color: var(--amber); }
.env-card.hum  .env-val { color: var(--blue); }
.env-unit {
  font-family: 'Martian Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

/* ── Grid Layout ─────────────────────────────────────────────── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

/* ── Panel ───────────────────────────────────────────────────── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 18px 16px;
}
.panel-title {
  font-family: 'Martian Mono', monospace;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title .badge {
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .04em;
}
.badge-on  { background: var(--green-dim);  color: var(--green); }
.badge-off { background: rgba(0,0,0,.3); color: var(--text3); border: 1px solid var(--border2); }

/* ── Toggle Switch ──────────────────────────────────────────── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}
.toggle-row + .toggle-row {
  border-top: 1px solid var(--border);
}
.toggle-label {
  font-size: 13px;
  font-weight: 500;
}
.toggle-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  font-family: 'Martian Mono', monospace;
  letter-spacing: .02em;
}

/* Pure CSS toggle switch */
.switch {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.switch-track {
  position: absolute;
  inset: 0;
  background: var(--border2);
  border-radius: 24px;
  cursor: pointer;
  transition: background .2s;
  border: 1px solid var(--border2);
}
.switch-track::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--text2);
  transition: transform .2s, background .2s;
}
.switch input:checked ~ .switch-track {
  background: rgba(16,185,129,.15);
  border-color: var(--green);
}
.switch input:checked ~ .switch-track::after {
  transform: translateX(20px);
  background: var(--green);
}

/* ── AC Panel ───────────────────────────────────────────────── */
.ac-panel {
  grid-column: span 2;
}
.ac-body {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  align-items: start;
}
.ac-temp-display {
  text-align: center;
  min-width: 100px;
}
.ac-temp-val {
  font-family: 'Martian Mono', monospace;
  font-size: 64px;
  font-weight: 200;
  letter-spacing: -.04em;
  color: var(--amber);
  line-height: 1;
}
.ac-temp-val span { font-size: 28px; color: var(--amber-dim); }
.ac-temp-label { font-size: 11px; color: var(--text3); margin-top: 4px; }

.ac-right {}
.temp-btns {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 12px;
}
.tbtn {
  padding: 8px 2px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Martian Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: var(--text2);
  cursor: pointer;
  text-align: center;
  transition: all .12s;
}
.tbtn:hover { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }
.tbtn.active { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 600; }

.ac-mode-btns {
  display: flex;
  gap: 6px;
}
.mbtn {
  flex: 1;
  padding: 9px 8px;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  background: var(--bg2);
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.mbtn:hover { background: var(--border2); color: var(--text); }
.mbtn.green { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.mbtn.red   { background: var(--red-dim);   border-color: var(--red);   color: var(--red); }
.mbtn.blue  { background: var(--blue-dim);  border-color: var(--blue);  color: var(--blue); }
.mbtn:active { transform: scale(.97); }

/* ── Quick Commands ─────────────────────────────────────────── */
.quick-panel { grid-column: span 2; }
.quick-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.qbtn {
  flex: 1;
  min-width: 120px;
  padding: 11px 16px;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  background: var(--bg2);
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.qbtn:hover    { background: var(--border2); color: var(--text); }
.qbtn:active   { transform: scale(.97); }
.qbtn.primary  { background: var(--amber); border-color: var(--amber); color: #000; }
.qbtn.primary:hover { opacity: .9; }
.qbtn.danger   { border-color: var(--red); color: var(--red); background: var(--red-dim); }

/* ── Loading Spinner ─────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Status Bar ─────────────────────────────────────────────── */
.statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 8px 20px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Martian Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .04em;
  z-index: 100;
}
.statusbar .log {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 60%;
}
.statusbar .log.ok   { color: var(--green); }
.statusbar .log.err  { color: var(--red); }
.statusbar .log.info { color: var(--amber); }

/* ── Toast ───────────────────────────────────────────────────── */
.toast {
  position: fixed;
  top: 20px; right: 20px;
  background: var(--panel);
  border: 1px solid var(--amber);
  border-radius: var(--r);
  padding: 10px 16px;
  font-family: 'Martian Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: .04em;
  opacity: 0;
  transform: translateY(-8px);
  transition: all .2s;
  pointer-events: none;
  z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width: 540px) {
  .main-grid { grid-template-columns: 1fr; }
  .ac-panel  { grid-column: span 1; }
  .quick-panel { grid-column: span 1; }
  .ac-body { grid-template-columns: 1fr; }
  .temp-btns { grid-template-columns: repeat(5, 1fr); }
  .env-val { font-size: 32px; }
  .ac-temp-val { font-size: 48px; }
}
</style>
</head>
<body>

<!-- ── Login Screen ──────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <span class="logo">Riveria Smart Home</span>
      <h1>Smart<span>Room</span></h1>
    </div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────── -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">Smart<span>Room</span> / Riveria</div>
    <div class="topbar-right">
      <div class="conn-badge">
        <div class="conn-dot" id="connDot"></div>
        <span id="connLabel">Connecting…</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Device online status + last update -->
  <div class="device-header">
    <div class="device-status">
      <div class="device-dot" id="deviceDot"></div>
      <span id="deviceLabel" style="font-family:'Martian Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text2)">Device Offline</span>
    </div>
    <div class="last-update" id="lastUpdate">—</div>
  </div>

  <!-- Environment -->
  <div class="sec-label" style="margin-top:4px">Environment</div>
  <div class="env-row">
    <div class="env-card temp">
      <div class="env-val" id="envTemp">—</div>
      <div class="env-unit">°C · Temperature</div>
    </div>
    <div class="env-card hum">
      <div class="env-val" id="envHum">—</div>
      <div class="env-unit">% · Humidity</div>
    </div>
  </div>

  <!-- Main controls grid -->
  <div class="sec-label" style="margin-top:16px">Controls</div>
  <div class="main-grid">

    <!-- Lighting -->
    <div class="panel">
      <div class="panel-title">Lighting</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Light 1</div>
          <div class="toggle-sub" id="r1sub">Relay 1</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="relay1Toggle" onchange="cmdRelay(0, this.checked)">
          <div class="switch-track"></div>
        </label>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Light 2</div>
          <div class="toggle-sub" id="r2sub">Relay 2</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="relay2Toggle" onchange="cmdRelay(1, this.checked)">
          <div class="switch-track"></div>
        </label>
      </div>
    </div>

    <!-- AC Power -->
    <div class="panel">
      <div class="panel-title">
        Air Conditioner
        <span class="badge badge-off" id="acBadge">OFF</span>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">AC Power</div>
          <div class="toggle-sub" id="acPowerSub">Standby</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="acToggle" onchange="cmdACPower(this.checked)">
          <div class="switch-track"></div>
        </label>
      </div>
      <div class="toggle-row" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
        <div class="ac-mode-btns" style="width:100%">
          <button class="mbtn green" onclick="cmdACPower(true)">On</button>
          <button class="mbtn red"   onclick="cmdACPower(false)">Off</button>
          <button class="mbtn blue"  onclick="cmdACFan()">Fan</button>
        </div>
      </div>
    </div>

    <!-- AC Temperature -->
    <div class="panel ac-panel">
      <div class="panel-title">Temperature Setpoint</div>
      <div class="ac-body">
        <div class="ac-temp-display">
          <div class="ac-temp-val" id="acTempVal">24<span>°C</span></div>
          <div class="ac-temp-label">Set Temp</div>
        </div>
        <div class="ac-right">
          <div class="temp-btns" id="tempBtns"></div>
          <!-- Temp buttons generated by JS -->
        </div>
      </div>
    </div>

    <!-- Quick Commands -->
    <div class="panel quick-panel">
      <div class="panel-title">Quick Commands</div>
      <div class="quick-btns">
        <button class="qbtn primary" onclick="cmdAllLights(true)">All Lights On</button>
        <button class="qbtn"         onclick="cmdAllLights(false)">All Lights Off</button>
        <button class="qbtn"         onclick="cmdACTemp(24)">AC 24°C On</button>
        <button class="qbtn"         onclick="cmdACTemp(27)">AC 27°C On</button>
        <button class="qbtn danger"  onclick="cmdAllOff()">All Off</button>
      </div>
    </div>

  </div><!-- /.main-grid -->
</div><!-- /#dashboard -->

<!-- Status bar -->
<div class="statusbar">
  <div class="log" id="logMsg">Connecting to Firebase…</div>
  <div id="tsDisplay">—</div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// ================================================================
// FIREBASE CONFIGURATION
// Ganti dengan config project Firebase kamu:
// Firebase Console → Project Settings → General → Your apps → Config
// ================================================================
 const firebaseConfig = {
    apiKey: "AIzaSyBzZBIKzwBJ4Nj25d2tJxGdGwJjH8hkU3E",
    authDomain: "smartroomsriveria.firebaseapp.com",
    databaseURL: "https://smartroomsriveria-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "smartroomsriveria",
    storageBucket: "smartroomsriveria.firebasestorage.app",

  };

// ================================================================
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

// ── State lokal UI ──────────────────────────────────────────────
let deviceState = {};
let currentUser = null;
let fbConnected = false;
let selectedAcTemp = 24;

// ── Utility: toast notif ──────────────────────────────────────
function toast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Utility: log ke statusbar ────────────────────────────────
function setLog(msg, type = '') {
  const el = document.getElementById('logMsg');
  el.textContent = msg;
  el.className = 'log ' + type;
}

// ── Auth ──────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) {
    errEl.textContent = 'Email dan password wajib diisi';
    errEl.style.display = 'block';
    return;
  }

  btn.textContent = 'Signing in…';
  btn.disabled    = true;
  errEl.style.display = 'none';

  try {
    await auth.signInWithEmailAndPassword(email, password);
    // onAuthStateChanged akan menangani transisi ke dashboard
  } catch (e) {
    errEl.textContent = mapAuthError(e.code);
    errEl.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled    = false;
  }
}

function mapAuthError(code) {
  const map = {
    'auth/user-not-found':   'Email tidak ditemukan',
    'auth/wrong-password':   'Password salah',
    'auth/invalid-email':    'Format email tidak valid',
    'auth/too-many-requests':'Terlalu banyak percobaan, coba lagi nanti',
    'auth/invalid-credential': 'Email atau password salah',
  };
  return map[code] || 'Login gagal: ' + code;
}

function doLogout() {
  auth.signOut();
  setLog('Signed out', '');
}

// ── Auth state observer ──────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display   = 'block';
    initDashboard();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display   = 'none';
    teardownDashboard();
    // Reset login form
    document.getElementById('loginBtn').textContent = 'Sign In';
    document.getElementById('loginBtn').disabled    = false;
  }
});

// ── Login form: Enter key ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !currentUser) doLogin();
});

// ── Dashboard init / teardown ────────────────────────────────
let stateListener = null;
let connListener  = null;

function initDashboard() {
  generateTempButtons();

  // Monitor koneksi Firebase (RTDB presence)
  const connRef = db.ref('.info/connected');
  connListener = connRef.on('value', snap => {
    fbConnected = !!snap.val();
    updateConnUI(fbConnected ? 'online' : 'offline');
  });

  // Real-time listener ke smartroom/state/
  const stateRef = db.ref('smartroom/state');
  stateListener = stateRef.on('value', snap => {
    const data = snap.val();
    if (!data) {
      setLog('Menunggu data dari ESP32…', 'info');
      return;
    }
    deviceState = data;
    renderState(data);
    setLog('State updated', 'ok');
  }, err => {
    setLog('Read error: ' + err.message, 'err');
  });
}

function teardownDashboard() {
  if (stateListener) {
    db.ref('smartroom/state').off('value', stateListener);
    stateListener = null;
  }
  if (connListener) {
    db.ref('.info/connected').off('value', connListener);
    connListener = null;
  }
}

// ── Render state dari Firebase ───────────────────────────────
function renderState(d) {
  // Relay toggles
  const r1 = document.getElementById('relay1Toggle');
  const r2 = document.getElementById('relay2Toggle');
  if (r1) r1.checked = !!d.relay1;
  if (r2) r2.checked = !!d.relay2;

  document.getElementById('r1sub').textContent = d.relay1 ? 'ON' : 'OFF';
  document.getElementById('r2sub').textContent = d.relay2 ? 'ON' : 'OFF';

  // AC
  const acTog = document.getElementById('acToggle');
  if (acTog) acTog.checked = !!d.ac_power;
  document.getElementById('acBadge').textContent    = d.ac_power ? 'ON' : 'OFF';
  document.getElementById('acBadge').className      = 'badge ' + (d.ac_power ? 'badge-on' : 'badge-off');
  document.getElementById('acPowerSub').textContent = d.ac_fan ? 'Fan Mode' : (d.ac_power ? 'Cooling' : 'Standby');

  // AC Temp
  const t = d.ac_temp || 24;
  document.getElementById('acTempVal').innerHTML = t + '<span>°C</span>';
  selectedAcTemp = t;
  highlightTemp(t);

  // Environment
  document.getElementById('envTemp').textContent =
    (d.room_temp !== undefined && d.room_temp !== null) ? (+d.room_temp).toFixed(1) : '—';
  document.getElementById('envHum').textContent =
    (d.room_humidity !== undefined && d.room_humidity !== null) ? Math.round(d.room_humidity) : '—';

  // Device online status
  const devOnline = !!d.online;
  document.getElementById('deviceDot').className   = 'device-dot ' + (devOnline ? 'on' : '');
  document.getElementById('deviceLabel').textContent = devOnline ? 'Device Online' : 'Device Offline';
  document.getElementById('deviceLabel').style.color = devOnline ? 'var(--green)' : 'var(--text3)';

  // Last update timestamp
  if (d.timestamp) {
    const dt = new Date(d.timestamp);
    document.getElementById('lastUpdate').textContent = 'Updated ' + dt.toLocaleTimeString('id-ID');
    document.getElementById('tsDisplay').textContent  = dt.toLocaleString('id-ID');
  }
}

function updateConnUI(status) {
  const dot   = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  dot.className = 'conn-dot ' + status;
  if (status === 'online') {
    label.textContent = 'Connected';
    setLog('Firebase connected', 'ok');
  } else {
    label.textContent = 'Offline';
    setLog('Firebase disconnected', 'err');
  }
}

// ── Generate temp buttons 16–30 ──────────────────────────────
function generateTempButtons() {
  const container = document.getElementById('tempBtns');
  if (!container) return;
  container.innerHTML = '';
  for (let t = 16; t <= 30; t++) {
    const btn = document.createElement('button');
    btn.className = 'tbtn';
    btn.id        = 'tb' + t;
    btn.textContent = t;
    btn.onclick   = () => cmdACTemp(t);
    container.appendChild(btn);
  }
}

function highlightTemp(t) {
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('tb' + t);
  if (el) el.classList.add('active');
}

// ================================================================
// COMMAND FUNCTIONS
// Semua perintah ditulis ke smartroom/command/ di Firebase.
// ESP32 polling setiap 10 detik dan menerapkan command jika
// timestamp command > timestamp command terakhir yang diproses.
// ================================================================

function sendCommand(cmd) {
  if (!currentUser) { toast('⚠ Not signed in'); return; }
  if (!fbConnected) { toast('⚠ No Firebase connection'); return; }

  // Tambahkan timestamp dan source ke setiap command
  const payload = Object.assign({}, cmd, {
    timestamp: Date.now(),   // Unix ms — ESP32 bandingkan dengan _lastCmdTs
    source:    'web_online'
  });

  db.ref('smartroom/command').set(payload)
    .then(() => setLog('Command sent: ' + JSON.stringify(cmd), 'ok'))
    .catch(e  => setLog('Command failed: ' + e.message, 'err'));
}

function cmdRelay(idx, state) {
  const key = idx === 0 ? 'relay1' : 'relay2';
  sendCommand({ [key]: state });
  toast(key.replace('r','R') + ' → ' + (state ? 'ON' : 'OFF'));
}

function cmdACPower(on) {
  sendCommand({ ac_power: on, ac_fan: false });
  toast('AC → ' + (on ? 'ON' : 'OFF'));
  const tog = document.getElementById('acToggle');
  if (tog) tog.checked = on;
}

function cmdACFan() {
  sendCommand({ ac_fan: true, ac_power: true });
  toast('AC → Fan Mode');
}

function cmdACTemp(temp) {
  selectedAcTemp = temp;
  highlightTemp(temp);
  document.getElementById('acTempVal').innerHTML = temp + '<span>°C</span>';
  sendCommand({ ac_temp: temp, ac_power: true, ac_fan: false });
  toast('AC Temp → ' + temp + '°C');
}

function cmdAllLights(on) {
  sendCommand({ relay1: on, relay2: on });
  toast('All Lights → ' + (on ? 'ON' : 'OFF'));
}

function cmdAllOff() {
  sendCommand({ relay1: false, relay2: false, ac_power: false, ac_fan: false });
  toast('Everything → OFF');
}
</script>
